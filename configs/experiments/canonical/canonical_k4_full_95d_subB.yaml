experiment:
  name: "canonical_k4_full_95d_subB"
  pipeline_type: "feature"
  seed: 42

# Mismo pipeline que canonical_k4_full_95d_v2 pero
# entrenado sobre el subconjunto B (sin GGMSIN y CJGSIN).
# Permite comparar métricas con la muestra completa
# y verificar que la exclusión no cambia la estructura de estados.
windowing:
  window_ms: 300
  step_ms:   100
  edge_trim: 1

paths:
  features_dir: "data/interim/features/task_hjorthonly_temporalqc/"
  output_dir:   "outputs/experiments/canonical/"

features:
  use_theta:   true
  use_alpha:   true
  use_beta:    true
  use_hjorth:  true
  use_entropy: false

# Sujetos a excluir del entrenamiento
# El script de extraccion debe respetar esta lista
exclude_subjects:
  - "GGMSIN"
  - "CJGSIN"

pipeline:
  pca:
    variance_retained: 0.90

  hmm:
    k_states:        4
    covariance_type: "full"
    n_iter:          500
    tol:             0.001
